name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100

    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Configurar Node.js 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Auditar dependências de produção
        run: npm audit --omit=dev

      - name: Auditar todas as dependências
        run: npm audit

      - name: Verificar código
        run: npm run lint

      - name: Instalar Chromium do Playwright
        run: npx playwright install --with-deps chromium

      - name: Executar testes
        run: npm run test

      - name: Gerar build de produção
        run: npm run build
